<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paperman: The 15 Bosses Challenge</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        canvas { background: #ecf0f1; border: 6px solid #95a5a6; cursor: crosshair; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* HUD */
        .hud { position: absolute; top: 40px; left: 40px; pointer-events: none; color: #2c3e50; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; z-index: 10; border-left: 5px solid #2980b9; min-width: 180px; }
        .lives { color: #e74c3c; font-size: 24px; margin-top: 5px; font-family: serif; }
        .timer { font-family: monospace; font-weight: bold; font-size: 18px; color: #2980b9; }
        .best-time { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }

        /* Boss UI */
        #bossUI { position: absolute; top: 40px; width: 450px; text-align: center; z-index: 5; }
        .hp-bg { width: 100%; height: 15px; background: #bdc3c7; border-radius: 10px; overflow: hidden; border: 2px solid #2c3e50; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #c0392b); transition: width 0.2s; }
        #bossName { color: #c0392b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; font-size: 20px; text-shadow: 1px 1px 0 #fff; }

        /* Game Over Overlay */
        #gameOverOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .torn-paper {
            background: #fdfdfd; padding: 40px; width: 400px; text-align: center; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            clip-path: polygon(0% 5%, 15% 0%, 30% 7%, 45% 2%, 60% 8%, 75% 3%, 90% 9%, 100% 4%, 98% 95%, 85% 100%, 70% 93%, 55% 98%, 40% 92%, 25% 97%, 10% 91%, 0% 96%);
        }
        .torn-paper h1 { color: #2d3436; font-size: 3rem; margin: 0; font-family: 'Courier New', Courier, monospace; }
        .retry-btn { background: #fab1a0; border: 2px dashed #ff7675; padding: 10px 30px; font-size: 1.5rem; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .retry-btn:hover { transform: scale(1.1) rotate(-2deg); background: #ff7675; }
    </style>
</head>
<body>

    <div id="gameOverOverlay">
        <div class="torn-paper">
            <h1>GAME OVER</h1>
            <p style="color: #636e72">O Paperman foi amassado...</p>
            <button class="retry-btn" onclick="retryGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <div class="hud">
        <div class="best-time">Recorde: <span id="bestDisplay">--:--</span></div>
        <div class="timer" id="timeDisplay">00:00</div>
        <hr>
        <b>PAPELMAN</b><br>
        Nível: <span id="lvlTxt">1</span>/15<br>
        <div class="lives" id="livesDisplay"></div>
        <small style="color: #666;">ESC: Pausar | Clique: Atirar</small>
    </div>

    <div id="bossUI">
        <div id="bossName">Chefão</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 650;

        let level = 1, hp = 6, isDead = false, isPaused = false, invencible = 0;
        let startTime, totalPausedTime = 0, pauseStart = 0, musicStarted = false;
        const player = { x: 450, y: 550, w: 40, h: 55, speed: 6 };
        let bullets = [], particles = [], bossProjectiles = [], boss = null;
        const keys = {};

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol, slide = false) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(slide) osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        let beat = 0;
        function startMusic() {
            if(musicStarted) return; musicStarted = true;
            setInterval(() => {
                if(isPaused || isDead) return;
                if(beat % 2 === 0) playSound(110, 'sine', 0.4, 0.1); 
                if(Math.random() > 0.6) playSound([440, 523, 587][Math.floor(Math.random()*3)], 'triangle', 0.2, 0.05);
                beat = (beat + 1) % 4;
            }, 250);
        }

        // --- BOSS DATA & SKINS ---
        const bossSkins = [
            { name: "Clipe de Aço", draw: (b) => { ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(b.x+20, b.y+20); ctx.lineTo(b.x+80, b.y+20); ctx.arc(b.x+80, b.y+50, 30, -Math.PI/2, Math.PI/2); ctx.lineTo(b.x+40, b.y+80); ctx.arc(b.x+40, b.y+55, 25, Math.PI/2, -Math.PI/2, true); ctx.stroke(); }},
            { name: "Borracha", draw: (b) => { ctx.fillStyle = "#ff7979"; ctx.fillRect(b.x, b.y, 100, 60); ctx.fillStyle="#badc58"; ctx.fillRect(b.x+70, b.y, 30, 60); }},
            { name: "Apontador", draw: (b) => { ctx.fillStyle = "#95a5a6"; ctx.fillRect(b.x, b.y, 80, 80); ctx.fillStyle="#34495e"; ctx.beginPath(); ctx.arc(b.x+40, b.y+40, 20, 0, Math.PI*2); ctx.fill(); }},
            { name: "Régua Justiceira", draw: (b) => { ctx.fillStyle = "#bdc3c7"; ctx.fillRect(b.x, b.y, 100, 30); ctx.fillStyle="#000"; for(let i=0; i<100; i+=10) ctx.fillRect(b.x+i, b.y, 2, 10); }},
            { name: "Grampeador", draw: (b) => { ctx.fillStyle = "#2c3e50"; ctx.fillRect(b.x, b.y, 100, 40); ctx.fillRect(b.x, b.y+40, 40, 20); }},
            { name: "Perfurador", draw: (b) => { ctx.fillStyle = "#7f8c8d"; ctx.fillRect(b.x, b.y+40, 100, 20); ctx.fillRect(b.x+20, b.y, 20, 40); ctx.fillRect(b.x+60, b.y, 20, 40); }},
            { name: "Tesoura Afiada", draw: (b) => { ctx.strokeStyle = "#34495e"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+100); ctx.moveTo(b.x+100, b.y); ctx.lineTo(b.x, b.y+100); ctx.stroke(); }},
            { name: "Cola Bastão", draw: (b) => { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x+30, b.y, 40, 100); ctx.fillStyle="#fff"; ctx.fillRect(b.x+30, b.y, 40, 20); }},
            { name: "Estilete", draw: (b) => { ctx.fillStyle = "#1abc9c"; ctx.fillRect(b.x, b.y+30, 100, 40); ctx.fillStyle="#bdc3c7"; ctx.fillRect(b.x+100, b.y+40, 30, 20); }},
            { name: "Calculadora", draw: (b) => { ctx.fillStyle = "#34495e"; ctx.fillRect(b.x, b.y, 80, 100); ctx.fillStyle="#95afc0"; ctx.fillRect(b.x+10, b.y+10, 60, 20); }},
            { name: "Compasso", draw: (b) => { ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(b.x+50, b.y); ctx.lineTo(b.x+30, b.y+100); ctx.moveTo(b.x+50, b.y); ctx.lineTo(b.x+70, b.y+100); ctx.stroke(); }},
            { name: "Tinta Guache", draw: (b) => { ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc(b.x+50, b.y+50, 40, 0, Math.PI*2); ctx.fill(); }},
            { name: "Esquadro", draw: (b) => { ctx.fillStyle = "rgba(52, 152, 219, 0.5)"; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+100); ctx.lineTo(b.x, b.y+100); ctx.fill(); }},
            { name: "Fragmentadora", draw: (b) => { ctx.fillStyle = "#2d3436"; ctx.fillRect(b.x, b.y, 100, 100); ctx.fillStyle="#636e72"; ctx.fillRect(b.x+10, b.y+20, 80, 10); }},
            { name: "PAPERMAN CORROMPIDO", draw: (b) => { 
                ctx.shadowBlur = 15; ctx.shadowColor = "red"; ctx.fillStyle = "#1a1a1a";
                ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+10); ctx.lineTo(b.x+90, b.y+100); ctx.lineTo(b.x+5, b.y+90); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(b.x+25, b.y+30, 15, 5); ctx.fillRect(b.x+60, b.y+30, 15, 5); ctx.shadowBlur = 0;
            }}
        ];

        // --- CORE LOGIC ---
        function initLevel() {
            bullets = []; particles = []; bossProjectiles = [];
            player.x = 450; player.y = 550; invencible = 0;
            if(!startTime) startTime = Date.now();
            document.getElementById('lvlTxt').innerText = level;
            const skin = bossSkins[level - 1];
            let bHp = 60 + (level * 40);
            boss = { x: 400, y: 100, w: 100, h: 100, hp: bHp, maxHp: bHp, vx: 4 + (level * 0.4), skin: skin, shotTimer: 0 };
            document.getElementById('bossName').innerText = skin.name;
            document.getElementById('hp-fill').style.width = "100%";
            updateLivesUI();
            const best = localStorage.getItem('papermanBest');
            document.getElementById('bestDisplay').innerText = best ? "Recorde: " + best : "Recorde: --:--";
        }

        function takeDamage() {
            if (invencible > 0 || isDead || isPaused) return;
            hp--; updateLivesUI(); playSound(150, 'sawtooth', 0.1, 0.2); 
            if (hp <= 0) {
                isDead = true; document.getElementById('gameOverOverlay').style.display = 'flex';
            } else invencible = 80;
        }

        function updateLivesUI() {
            let h = ""; let t = hp;
            for(let i=0; i<3; i++) { if(t>=2){ h+="❤️"; t-=2; } else if(t==1){ h+="💔"; t-=1; } else h+="🖤"; }
            document.getElementById('livesDisplay').innerHTML = h;
        }

        function retryGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            level = 1; hp = 6; isDead = false; startTime = Date.now(); totalPausedTime = 0;
            initLevel();
        }

        window.onkeydown = (e) => { 
            if (e.key === "Escape") { isPaused = !isPaused; if (isPaused) pauseStart = Date.now(); else totalPausedTime += (Date.now() - pauseStart); }
            keys[e.key.toLowerCase()] = true; 
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        window.onmousedown = (e) => {
            if (isDead || isPaused) return;
            startMusic();
            const rect = canvas.getBoundingClientRect();
            const angle = Math.atan2((e.clientY - rect.top) - (player.y + 25), (e.clientX - rect.left) - (player.x + 20));
            bullets.push({ x: player.x + 20, y: player.y + 25, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
            playSound(400, 'triangle', 0.1, 0.1, true);
        };

        function update() {
            if (isPaused || isDead) return;
            let elapsed = Date.now() - startTime - totalPausedTime;
            let s = Math.floor(elapsed/1000);
            document.getElementById('timeDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

            if (invencible > 0) invencible--;
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.h) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.w) player.x += player.speed;

            boss.x += boss.vx; if(boss.x < 50 || boss.x > 750) boss.vx *= -1;
            boss.shotTimer++;
            if (boss.shotTimer > Math.max(15, 80 - (level * 4))) {
                const angle = Math.atan2((player.y + 25) - (boss.y + 50), (player.x + 20) - (boss.x + 50));
                bossProjectiles.push({ x: boss.x + 50, y: boss.y + 50, vx: Math.cos(angle) * (6 + level/2), vy: Math.sin(angle) * (6 + level/2) });
                boss.shotTimer = 0;
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                    boss.hp -= 10; bullets.splice(i, 1); playSound(800, 'square', 0.05, 0.05);
                    document.getElementById('hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
                } else if(b.x < 0 || b.x > 900 || b.y < 0 || b.y > 650) bullets.splice(i, 1);
            });

            bossProjectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(Math.hypot(player.x + 20 - p.x, player.y + 25 - p.y) < 25) { takeDamage(); bossProjectiles.splice(i, 1); }
                else if(p.x < 0 || p.x > 900 || p.y < 0 || p.y > 650) bossProjectiles.splice(i, 1);
            });

            if(boss.hp <= 0) {
                if(level === 15) {
                    const timeStr = document.getElementById('timeDisplay').innerText;
                    const best = localStorage.getItem('papermanBest');
                    if(!best || timeStr < best) localStorage.setItem('papermanBest', timeStr);
                    alert("VITÓRIA! Tempo: " + timeStr); level = 1; startTime = Date.now();
                } else level++;
                initLevel();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid background
            ctx.strokeStyle = "rgba(52, 152, 219, 0.1)"; ctx.lineWidth = 1;
            for(let i=0; i<canvas.height; i+=30) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            
            // Paperman draw
            if (invencible % 10 < 5) {
                ctx.fillStyle = "#fff"; ctx.strokeStyle = "#636e72"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(player.x+2, player.y+5); ctx.lineTo(player.x+38, player.y+2); ctx.lineTo(player.x+40, player.y+50); ctx.lineTo(player.x+5, player.y+53); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(player.x+12, player.y+15, 2, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+28, player.y+15, 2, 0, 7); ctx.fill();
            }

            ctx.fillStyle = "#fff"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); ctx.stroke(); });
            ctx.fillStyle = "#e74c3c"; bossProjectiles.forEach(p => ctx.fillRect(p.x-5, p.y-5, 10, 10));
            boss.skin.draw(boss);
            
            if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,900,650); ctx.fillStyle = "#fff"; ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText("PAUSA", 450, 325); }

            update(); requestAnimationFrame(draw);
        }

        initLevel(); draw();
    </script>
</body>
</html>
