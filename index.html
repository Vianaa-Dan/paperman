<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paperman: Advanced Boss AI</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #ecf0f1; border: 6px solid #95a5a6; cursor: crosshair; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hud { position: absolute; top: 20px; left: 20px; pointer-events: none; color: #2c3e50; background: rgba(255,255,255,0.9); padding: 12px; border-radius: 8px; z-index: 10; border-left: 5px solid #2980b9; min-width: 160px; }
        .lives { color: #e74c3c; font-size: 22px; margin-top: 5px; }
        #bossUI { position: absolute; top: 20px; width: 400px; text-align: center; z-index: 5; }
        .hp-bg { width: 100%; height: 12px; background: #bdc3c7; border-radius: 10px; overflow: hidden; border: 2px solid #2c3e50; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #c0392b); transition: width 0.1s; }
        #bossName { color: #c0392b; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; font-size: 18px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .torn-paper { background: #fdfdfd; padding: 30px; width: 350px; text-align: center; color: #2d3436; clip-path: polygon(0% 5%, 15% 0%, 30% 7%, 45% 2%, 60% 8%, 75% 3%, 90% 9%, 100% 4%, 98% 95%, 85% 100%, 70% 93%, 55% 98%, 40% 92%, 25% 97%, 10% 91%, 0% 96%); }
        .btn { background: #fab1a0; border: 2px dashed #ff7675; padding: 12px 25px; font-size: 1.2rem; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="startMenu" class="overlay">
        <div class="torn-paper">
            <h1 style="font-size: 2.5rem; margin:0;">PAPERMAN</h1>
            <p>Cuidado: Nos níveis altos, os chefes vão caçar você!</p>
            <button class="btn" onclick="startGame()">INICIAR</button>
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay" style="display: none;">
        <div class="torn-paper">
            <h1>AMASSADO!</h1>
            <button class="btn" onclick="retryGame()">RECOMEÇAR</button>
        </div>
    </div>

    <div class="hud">
        <div id="timeDisplay" style="font-weight:bold; color:#2980b9;">00:00</div>
        <b>Nível: <span id="lvlTxt">1</span>/15</b>
        <div class="lives" id="livesDisplay"></div>
        <div id="aiMode" style="font-size: 10px; color: #7f8c8d; margin-top: 5px;"></div>
    </div>

    <div id="bossUI">
        <div id="bossName">Chefão</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const screenW = 800, screenH = 600;
        const worldW = 1600, worldH = 1200;
        canvas.width = screenW; canvas.height = screenH;

        let level = 1, hp = 6, gameStarted = false, isDead = false;
        let startTime, invencible = 0, powerTimer = 0, powerType = "";
        
        const player = { x: 800, y: 1000, w: 40, h: 55, speed: 6 };
        const camera = { x: 0, y: 0 };
        let bullets = [], bossProjectiles = [], items = [], obstacles = [], boss = null;
        const keys = {};

        const bossSkins = [
            { n: "Clipe", c: "#95a5a6" }, { n: "Borracha", c: "#ff7979" }, { n: "Apontador", c: "#7f8c8d" },
            { n: "Régua", c: "#bdc3c7" }, { n: "Grampeador", c: "#2c3e50" }, { n: "Perfurador", c: "#34495e" },
            { n: "Tesoura", c: "#c0392b" }, { n: "Cola", c: "#f1c40f" }, { n: "Estilete", c: "#1abc9c" },
            { n: "Calculadora", c: "#2d3436" }, { n: "Compasso", c: "#7f8c8d" }, { n: "Tinta", c: "#e67e22" },
            { n: "Esquadro", c: "#3498db" }, { n: "Fragmentadora", c: "#2d3436" }, { n: "PAPERMAN CORROMPIDO", c: "#000" }
        ];

        function createObstacles() {
            obstacles = [];
            for(let i=0; i<15; i++) {
                obstacles.push({
                    x: Math.random() * (worldW - 200) + 100,
                    y: Math.random() * (worldH - 400) + 200,
                    w: Math.random() * 80 + 40,
                    h: Math.random() * 80 + 40,
                    color: "#bdc3c7"
                });
            }
        }

        function checkObstacleCollision(obj, nextX, nextY) {
            for(let ob of obstacles) {
                if(nextX < ob.x + ob.w && nextX + (obj.w || 5) > ob.x &&
                   nextY < ob.y + ob.h && nextY + (obj.h || 5) > ob.y) return true;
            }
            return false;
        }

        function startGame() { 
            document.getElementById('startMenu').style.display = 'none'; 
            gameStarted = true; startTime = Date.now(); initLevel(); setInterval(() => { if(gameStarted) spawnItem() }, 8000); loop(); 
        }

        function spawnItem() {
            const types = ["heal", "strength", "speed"];
            items.push({ x: Math.random() * (worldW - 100) + 50, y: Math.random() * (worldH - 100) + 50, type: types[Math.floor(Math.random()*3)] });
        }

        function initLevel() {
            bullets = []; bossProjectiles = []; items = []; hp = 6;
            player.x = worldW/2; player.y = worldH - 150;
            const s = bossSkins[Math.min(level-1, 14)];
            boss = { 
                x: worldW/2 - 60, y: 150, w: 120, h: 120, 
                hp: 100+(level*50), maxHp: 100+(level*50), 
                speed: 2 + (level * 0.3), vx: 4, vy: 0,
                color: s.c, n: s.n, timer: 0 
            };
            document.getElementById('lvlTxt').innerText = level;
            document.getElementById('bossName').innerText = boss.n;
            document.getElementById('hp-fill').style.width = "100%";
            document.getElementById('aiMode').innerText = level > 10 ? "MODO: CAÇADOR" : (level > 5 ? "MODO: PATRULHA" : "MODO: PASSIVO");
            createObstacles(); updateLivesUI();
        }

        function updateLivesUI() {
            let h = ""; let t = hp;
            for(let i=0; i<3; i++) { if(t>=2){h+="❤️";t-=2;} else if(t==1){h+="💔";t-=1;} else h+="🖤"; }
            document.getElementById('livesDisplay').innerHTML = h;
        }

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        window.onmousedown = (e) => {
            if(!gameStarted || isDead) return;
            const angle = Math.atan2((e.clientY - canvas.offsetTop + camera.y) - (player.y + 25), (e.clientX - canvas.offsetLeft + camera.x) - (player.x + 20));
            bullets.push({ x: player.x + 20, y: player.y + 25, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
        };

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        function update() {
            if(!gameStarted || isDead) return;

            let curSpeed = player.speed + (powerType === "speed" ? 4 : 0);
            let nextX = player.x, nextY = player.y;
            if(keys['w']) nextY -= curSpeed; if(keys['s']) nextY += curSpeed;
            if(keys['a']) nextX -= curSpeed; if(keys['d']) nextX += curSpeed;

            if(!checkObstacleCollision(player, nextX, player.y)) player.x = Math.max(0, Math.min(nextX, worldW - player.w));
            if(!checkObstacleCollision(player, player.x, nextY)) player.y = Math.max(0, Math.min(nextY, worldH - player.h));

            camera.x = player.x - screenW/2; camera.y = player.y - screenH/2;
            camera.x = Math.max(0, Math.min(camera.x, worldW - screenW));
            camera.y = Math.max(0, Math.min(camera.y, worldH - screenH));

            // --- IA DO BOSS EVOLUTIVA ---
            if (level <= 5) {
                // Modo Passivo: Apenas horizontal
                boss.x += boss.vx; if(boss.x < 100 || boss.x > worldW - 220) boss.vx *= -1;
            } else if (level <= 10) {
                // Modo Patrulha: Tenta se alinhar horizontalmente com o jogador
                if (boss.x + boss.w/2 < player.x) boss.x += boss.speed;
                else boss.x -= boss.speed;
            } else {
                // Modo Caçador: Persegue o jogador em X e Y
                const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                boss.x += Math.cos(angle) * boss.speed;
                boss.y += Math.sin(angle) * boss.speed;
            }

            boss.timer++;
            if(boss.timer > Math.max(10, 60 - level)) {
                const a = Math.atan2((player.y+25)-(boss.y+60), (player.x+20)-(boss.x+60));
                bossProjectiles.push({ x: boss.x+60, y: boss.y+60, vx: Math.cos(a)*7, vy: Math.sin(a)*7 });
                boss.timer = 0;
            }

            items.forEach((it, i) => { if(Math.hypot(player.x - it.x, player.y - it.y) < 40) { 
                if(it.type === "heal") hp = Math.min(6, hp + 1); else { powerType = it.type; powerTimer = 600; }
                items.splice(i, 1); updateLivesUI();
            }});

            if(powerTimer > 0) powerTimer--; else powerType = "";

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(checkObstacleCollision({w:5, h:5}, b.x, b.y)) bullets.splice(i,1);
                else if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                    boss.hp -= (powerType === "strength" ? 30 : 10); bullets.splice(i, 1);
                    document.getElementById('hp-fill').style.width = (boss.hp/boss.maxHp*100) + "%";
                    if(boss.hp <= 0) { level++; if(level > 15) { alert("VOCÊ É O MESTRE DO PAPEL!"); location.reload(); } else initLevel(); }
                }
            });

            bossProjectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(checkObstacleCollision({w:10, h:10}, p.x, p.y)) bossProjectiles.splice(i,1);
                else if(Math.hypot(player.x+20-p.x, player.y+25-p.y) < 25 && invencible <= 0) {
                    hp--; invencible = 60; bossProjectiles.splice(i, 1); updateLivesUI();
                    if(hp <= 0) { isDead = true; document.getElementById('gameOverOverlay').style.display = 'flex'; }
                }
            });
            if(invencible > 0) invencible--;
        }

        function draw() {
            ctx.clearRect(0, 0, screenW, screenH);
            ctx.save(); ctx.translate(-camera.x, -camera.y);

            // Chão Grid
            ctx.strokeStyle = "rgba(0,0,0,0.05)";
            for(let x=0; x<=worldW; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,worldH); ctx.stroke(); }
            for(let y=0; y<=worldH; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(worldW,y); ctx.stroke(); }

            obstacles.forEach(ob => {
                ctx.fillStyle = ob.color; ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
                ctx.strokeStyle = "#7f8c8d"; ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
            });

            items.forEach(it => {
                ctx.fillStyle = it.type === "heal" ? "#e74c3c" : (it.type === "speed" ? "#3498db" : "#f1c40f");
                ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, 7); ctx.fill();
            });

            if(invencible % 10 < 5) {
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(player.x+2, player.y+5); ctx.lineTo(player.x+38, player.y+2); ctx.lineTo(player.x+40, player.y+50); ctx.lineTo(player.x+5, player.y+53); ctx.closePath();
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = "black"; ctx.fillRect(player.x+10, player.y+15, 4, 4); ctx.fillRect(player.x+26, player.y+15, 4, 4);
            }

            ctx.fillStyle = "black"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); });
            ctx.fillStyle = "orange"; bossProjectiles.forEach(p => ctx.fillRect(p.x-5, p.y-5, 10, 10));
            
            ctx.fillStyle = boss.color; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
            ctx.strokeStyle = "black"; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
            ctx.restore();

            let s = Math.floor((Date.now() - startTime)/1000);
            document.getElementById('timeDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        function retryGame() { location.reload(); }
    </script>
</body>
</html>
