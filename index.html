<script>
    // --- SISTEMA DE ÁUDIO (WEB AUDIO API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playShootSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playMetalHitSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playPaperRipSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000;
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        noise.start();
    }

    // --- INTEGRAÇÃO COM A LÓGICA EXISTENTE ---

    // No window.onmousedown:
    window.onmousedown = (e) => {
        if (isDead || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const angle = Math.atan2((e.clientY - rect.top) - (player.y + 25), (e.clientX - rect.left) - (player.x + 20));
        bullets.push({ x: player.x + 20, y: player.y + 25, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
        playShootSound(); // Toca ao atirar
    };

    // Na função takeDamage():
    function takeDamage() {
        if (invencible > 0 || isDead || isPaused) return;
        hp--; 
        updateLivesUI();
        playPaperRipSound(); // Som de papel rasgando ao levar dano
        createExplosion(player.x + 20, player.y + 25, "#ff7675", 10);
        // ... resto do código de morte
    }

    // Na função update(), dentro da colisão das balas com o Boss:
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.hp -= 10; 
            bullets.splice(i, 1);
            playMetalHitSound(); // Som metálico ao atingir o boss
            createExplosion(b.x, b.y, "#dfe6e9", 5);
            document.getElementById('hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
        }
        // ...
    });

    // ... (Mantenha o resto das funções draw, initLevel, etc.)
</script>
