<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paperman: Artisanal Challenge</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #ecf0f1; border: 6px solid #95a5a6; cursor: crosshair; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .hud { position: absolute; top: 40px; left: 40px; pointer-events: none; color: #2c3e50; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; z-index: 10; border-left: 5px solid #2980b9; min-width: 180px; }
        .lives { color: #e74c3c; font-size: 24px; margin-top: 5px; font-family: serif; }
        .timer { font-family: monospace; font-weight: bold; font-size: 18px; color: #2980b9; margin-bottom: 5px; }

        #bossUI { position: absolute; top: 40px; width: 450px; text-align: center; z-index: 5; }
        .hp-bg { width: 100%; height: 15px; background: #bdc3c7; border-radius: 10px; overflow: hidden; border: 2px solid #2c3e50; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #c0392b); transition: width 0.2s; }
        #bossName { color: #c0392b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; font-size: 20px; }

        #gameOverOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .torn-paper {
            background: #fdfdfd; padding: 40px; width: 350px; text-align: center;
            clip-path: polygon(0% 5%, 15% 0%, 30% 7%, 45% 2%, 60% 8%, 75% 3%, 90% 9%, 100% 4%, 98% 95%, 85% 100%, 70% 93%, 55% 98%, 40% 92%, 25% 97%, 10% 91%, 0% 96%);
        }
        .retry-btn { background: #fab1a0; border: 2px dashed #ff7675; padding: 10px 30px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="gameOverOverlay">
        <div class="torn-paper">
            <h1 style="color: #2d3436; margin:0; font-size: 2.5rem;">GAME OVER</h1>
            <p style="color: #636e72">O Paperman foi amassado...</p>
            <button class="retry-btn" onclick="retryGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <div class="hud">
        <div class="timer" id="timeDisplay">00:00</div>
        <hr>
        <b>Nível: <span id="lvlTxt">1</span>/15</b>
        <div class="lives" id="livesDisplay">❤️❤️❤️</div>
        <small style="color: #666;">ESC: Pausar | Clique: Atirar</small>
    </div>

    <div id="bossUI">
        <div id="bossName">Chefão</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;

        let level = 1, hp = 6, isDead = false, isPaused = false, invencible = 0;
        let startTime = Date.now(), totalPausedTime = 0, pauseStart = 0;
        const player = { x: 380, y: 500, w: 40, h: 55, speed: 6 };
        let bullets = [], particles = [], bossProjectiles = [], boss = null;
        const keys = {};

        // --- SKINS ---
        const bossSkins = [
            { name: "Clipe de Aço", color: "#95a5a6" }, { name: "Borracha", color: "#ff7979" },
            { name: "Apontador", color: "#7f8c8d" }, { name: "Régua", color: "#bdc3c7" },
            { name: "Grampeador", color: "#2c3e50" }, { name: "Perfurador", color: "#34495e" },
            { name: "Tesoura", color: "#c0392b" }, { name: "Cola Bastão", color: "#f1c40f" },
            { name: "Estilete", color: "#1abc9c" }, { name: "Calculadora", color: "#2d3436" },
            { name: "Compasso", color: "#7f8c8d" }, { name: "Tinta", color: "#e67e22" },
            { name: "Esquadro", color: "#3498db" }, { name: "Fragmentadora", color: "#2d3436" },
            { name: "PAPERMAN CORROMPIDO", color: "#000" }
        ];

        function initLevel() {
            bullets = []; bossProjectiles = []; particles = [];
            player.x = 380; player.y = 500; invencible = 0;
            const s = bossSkins[level-1];
            let bHp = 50 + (level * 35);
            boss = { x: 350, y: 80, w: 100, h: 100, hp: bHp, maxHp: bHp, vx: 3 + (level*0.4), color: s.color, name: s.name, timer: 0 };
            document.getElementById('lvlTxt').innerText = level;
            document.getElementById('bossName').innerText = boss.name;
            document.getElementById('hp-fill').style.width = "100%";
            updateLivesUI();
        }

        function updateLivesUI() {
            let h = ""; let t = hp;
            for(let i=0; i<3; i++) { if(t>=2){h+="❤️";t-=2;} else if(t==1){h+="💔";t-=1;} else h+="🖤"; }
            document.getElementById('livesDisplay').innerHTML = h;
        }

        function retryGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            level = 1; hp = 6; isDead = false; startTime = Date.now(); totalPausedTime = 0;
            initLevel();
        }

        function takeDamage() {
            if (invencible > 0 || isDead || isPaused) return;
            hp--; updateLivesUI();
            createExplosion(player.x + 20, player.y + 25, "#ff7675", 10);
            if (hp <= 0) {
                isDead = true; 
                createExplosion(player.x + 20, player.y + 25, "#fff", 40);
                setTimeout(() => { document.getElementById('gameOverOverlay').style.display = 'flex'; }, 800);
            } else { invencible = 80; }
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x, y: y, size: Math.random() * 6 + 2, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, color: color, alpha: 1 });
            }
        }

        window.onkeydown = (e) => { 
            if(e.key === "Escape") isPaused = !isPaused;
            keys[e.key.toLowerCase()] = true; 
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        
        window.onmousedown = (e) => {
            if(isDead || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const angle = Math.atan2((e.clientY - rect.top) - (player.y + 25), (e.clientX - rect.left) - (player.x + 20));
            bullets.push({ x: player.x + 20, y: player.y + 25, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
        };

        function update() {
            if(isPaused || isDead) return;

            let s = Math.floor((Date.now() - startTime - totalPausedTime)/1000);
            document.getElementById('timeDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

            if(invencible > 0) invencible--;
            if(keys['w'] && player.y > 0) player.y -= player.speed;
            if(keys['s'] && player.y < 545) player.y += player.speed;
            if(keys['a'] && player.x > 0) player.x -= player.speed;
            if(keys['d'] && player.x < 760) player.x += player.speed;

            boss.x += boss.vx; if(boss.x < 0 || boss.x > 700) boss.vx *= -1;
            boss.timer++;
            if(boss.timer > Math.max(15, 85 - (level*4))) {
                const a = Math.atan2((player.y+25)-(boss.y+50), (player.x+20)-(boss.x+50));
                bossProjectiles.push({ x: boss.x+50, y: boss.y+50, vx: Math.cos(a)*(6 + level/2), vy: Math.sin(a)*(6 + level/2) });
                boss.timer = 0;
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x > boss.x && b.x < boss.x+100 && b.y > boss.y && b.y < boss.y+100) {
                    boss.hp -= 10; bullets.splice(i, 1);
                    createExplosion(b.x, b.y, "#bdc3c7", 5);
                    document.getElementById('hp-fill').style.width = (boss.hp/boss.maxHp*100) + "%";
                }
                else if(b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) bullets.splice(i, 1);
            });

            bossProjectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(Math.hypot(player.x+20-p.x, player.y+25-p.y) < 25 && invencible <= 0) {
                    takeDamage(); bossProjectiles.splice(i, 1);
                }
                else if(p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) bossProjectiles.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.alpha -= 0.02;
                if(p.alpha <= 0) particles.splice(i, 1);
            });

            if(boss.hp <= 0) {
                createExplosion(boss.x + 50, boss.y + 50, "#333", 60);
                if(level === 15) { alert("VOCÊ SALVOU O MUNDO DE PAPEL!"); level = 1; startTime = Date.now(); } else { level++; }
                setTimeout(initLevel, 600);
            }
        }

        // --- NOVO DESENHO DO PLAYER (PAPERMAN DETALHADO) ---
        function drawPlayer() {
            if (invencible % 10 < 5) {
                ctx.save();
                ctx.translate(player.x, player.y);

                // Sombra projetada no "chão"
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.beginPath(); ctx.ellipse(20, 60, 15, 5, 0, 0, Math.PI * 2); ctx.fill();

                // Corpo de Papel (Forma irregular recortada)
                ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#4b4b4b"; ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(2, 5); ctx.lineTo(15, 0); ctx.lineTo(38, 3); ctx.lineTo(35, 25); ctx.lineTo(40, 52); ctx.lineTo(20, 55); ctx.lineTo(3, 50); ctx.lineTo(5, 20);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // Textura de Dobras
                ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(5, 15); ctx.lineTo(35, 25); ctx.moveTo(10, 40); ctx.lineTo(30, 35); ctx.stroke();

                // Rosto "Desenhado a Lápis"
                ctx.fillStyle = "#2d3436";
                ctx.beginPath(); ctx.ellipse(12, 18, 2.5, 3.5, 0, 0, Math.PI * 2); ctx.fill(); // Olho esquerdo
                ctx.beginPath(); ctx.ellipse(28, 18, 2.5, 3.5, 0, 0, Math.PI * 2); ctx.fill(); // Olho direito
                
                ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(20, 28, 6, 0.2, Math.PI - 0.2); ctx.stroke(); // Boca

                // Pequenas pontas de papel no topo
                ctx.beginPath(); ctx.moveTo(5, 5); ctx.lineTo(0, -5); ctx.lineTo(10, 2); ctx.fillStyle = "white"; ctx.fill(); ctx.stroke();

                ctx.restore();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid de papel
            ctx.strokeStyle = "rgba(0,0,0,0.05)"; ctx.lineWidth = 1;
            for(let i=0; i<800; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
            for(let i=0; i<600; i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }

            // Partículas de explosão
            particles.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1; });
            
            drawPlayer(); // Novo desenho detalhado

            // Balas do player (bolinhas de papel)
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#ccc";
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); ctx.stroke(); });

            // Tiros do boss
            ctx.fillStyle = "#e74c3c"; bossProjectiles.forEach(p => ctx.fillRect(p.x-5, p.y-5, 10, 10));

            // Boss
            ctx.fillStyle = boss.color; ctx.fillRect(boss.x, boss.y, 100, 100);
            ctx.strokeStyle = "black"; ctx.strokeRect(boss.x, boss.y, 100, 100);
            if(level === 15) { ctx.fillStyle = "red"; ctx.fillRect(boss.x+20, boss.y+20, 10, 10); ctx.fillRect(boss.x+70, boss.y+20, 10, 10); }

            if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,800,600); ctx.fillStyle = "#fff"; ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText("PAUSA", 400, 320); }

            update();
            requestAnimationFrame(draw);
        }

        initLevel();
        draw();
    </script>
</body>
</html>
