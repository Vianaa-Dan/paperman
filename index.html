<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paperman: Full Heal Edition</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #ecf0f1; border: 6px solid #95a5a6; cursor: crosshair; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .hud { position: absolute; top: 40px; left: 40px; pointer-events: none; color: #2c3e50; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; z-index: 10; border-left: 5px solid #2980b9; min-width: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lives { color: #e74c3c; font-size: 24px; margin-top: 5px; font-family: serif; }
        .timer { font-family: monospace; font-weight: bold; font-size: 18px; color: #2980b9; margin-bottom: 5px; }

        #bossUI { position: absolute; top: 40px; width: 450px; text-align: center; z-index: 5; }
        .hp-bg { width: 100%; height: 15px; background: #bdc3c7; border-radius: 10px; overflow: hidden; border: 2px solid #2c3e50; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #c0392b); transition: width 0.2s; }
        #bossName { color: #c0392b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; font-size: 20px; text-shadow: 1px 1px 0 #fff; }

        #audioControl { position: absolute; top: 40px; right: 40px; z-index: 100; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #2980b9; transition: 0.1s; }
        #audioControl:active { transform: translateY(3px); box-shadow: 0 1px 0 #2980b9; }

        #gameOverOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .torn-paper {
            background: #fdfdfd; padding: 40px; width: 350px; text-align: center;
            clip-path: polygon(0% 5%, 15% 0%, 30% 7%, 45% 2%, 60% 8%, 75% 3%, 90% 9%, 100% 4%, 98% 95%, 85% 100%, 70% 93%, 55% 98%, 40% 92%, 25% 97%, 10% 91%, 0% 96%);
        }
        .retry-btn { background: #fab1a0; border: 2px dashed #ff7675; padding: 10px 30px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; transition: 0.2s; font-family: 'Segoe UI', sans-serif; }
        .retry-btn:hover { transform: scale(1.1) rotate(-2deg); background: #ff7675; }
    </style>
</head>
<body>

    <button id="audioControl" onclick="toggleAudio()">🔈 SOM: DESLIGADO</button>

    <div id="gameOverOverlay">
        <div class="torn-paper">
            <h1 style="color: #2d3436; margin:0; font-size: 3rem; font-family: 'Courier New', monospace;">GAME OVER</h1>
            <p style="color: #636e72">O Paperman foi amassado...</p>
            <button class="retry-btn" onclick="retryGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <div class="hud">
        <div class="timer" id="timeDisplay">00:00</div>
        <hr>
        <b>Nível: <span id="lvlTxt">1</span>/15</b>
        <div class="lives" id="livesDisplay"></div>
        <small style="color: #666;">ESC: Pausar | Clique: Atirar</small>
    </div>

    <div id="bossUI">
        <div id="bossName">Chefão</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 650;

        let level = 1, hp = 6, isDead = false, isPaused = false, invencible = 0;
        let startTime = Date.now(), totalPausedTime = 0, pauseStart = 0;
        const player = { x: 450, y: 550, w: 40, h: 55, speed: 6 };
        let bullets = [], particles = [], bossProjectiles = [], boss = null;
        const keys = {};

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let isMuted = true;
        let musicInterval = null;

        function toggleAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isMuted = !isMuted;
            const btn = document.getElementById('audioControl');
            if (isMuted) { btn.innerText = "🔈 SOM: DESLIGADO"; btn.style.background = "#3498db"; } 
            else { btn.innerText = "🔊 SOM: LIGADO"; btn.style.background = "#2ecc71"; startMusic(); }
        }

        function playSound(freq, type, duration, vol, slide = false) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(slide) osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startMusic() {
            if (musicInterval) return;
            let beat = 0;
            musicInterval = setInterval(() => {
                if (isPaused || isDead || isMuted) return;
                if (beat % 2 === 0) playSound(110, 'sine', 0.4, 0.05);
                if (Math.random() > 0.7) playSound([440, 523, 659][Math.floor(Math.random()*3)], 'triangle', 0.2, 0.03);
                beat = (beat + 1) % 4;
            }, 250);
        }

        // --- SKINS DOS CHEFÕES ---
        function drawClipe(b) {
            ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(b.x+20, b.y+20); ctx.lineTo(b.x+80, b.y+20);
            ctx.arc(b.x+80, b.y+50, 30, -Math.PI/2, Math.PI/2); ctx.lineTo(b.x+40, b.y+80);
            ctx.arc(b.x+40, b.y+55, 25, Math.PI/2, -Math.PI/2, true); ctx.stroke();
        }
        function drawBorracha(b) {
            ctx.fillStyle = "#ff7979"; ctx.fillRect(b.x, b.y, 100, 60); ctx.fillStyle="#badc58"; ctx.fillRect(b.x+70, b.y, 30, 60);
            ctx.strokeStyle="#333"; ctx.lineWidth=1; ctx.strokeRect(b.x, b.y, 100, 60);
        }
        function drawApontador(b) {
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(b.x, b.y, 80, 80); ctx.fillStyle="#34495e"; ctx.beginPath(); ctx.arc(b.x+40, b.y+40, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#bdc3c7"; ctx.fillRect(b.x+10, b.y+35, 15, 10);
        }
        function drawRegua(b) {
            ctx.fillStyle = "rgba(189, 195, 199, 0.8)"; ctx.fillRect(b.x, b.y, 100, 30); ctx.fillStyle="#000"; ctx.font="10px Arial";
            for(let i=0; i<=100; i+=10) { ctx.fillRect(b.x+i, b.y, 2, 8); if(i%20==0)ctx.fillText(i/10, b.x+i-3, b.y+20); }
        }
        function drawGrampeador(b) {
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(b.x, b.y, 100, 40); ctx.fillStyle="#bdc3c7"; ctx.fillRect(b.x+5, b.y+35, 90, 10);
            ctx.fillStyle="#34495e"; ctx.fillRect(b.x+10, b.y, 20, 20);
        }
        function drawPerfurador(b) {
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(b.x, b.y+40, 100, 20);
            ctx.fillStyle="#34495e"; ctx.fillRect(b.x+20, b.y, 20, 40); ctx.fillRect(b.x+60, b.y, 20, 40);
        }
        function drawTesoura(b) {
            ctx.strokeStyle = "#34495e"; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+100); ctx.moveTo(b.x+100, b.y); ctx.lineTo(b.x, b.y+100); ctx.stroke();
            ctx.fillStyle="#c0392b"; ctx.beginPath(); ctx.arc(b.x+15, b.y+15, 20, 0, 7); ctx.arc(b.x+85, b.y+15, 20, 0, 7); ctx.fill();
        }
        function drawCola(b) {
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x+30, b.y, 40, 100); ctx.fillStyle="#fff"; ctx.fillRect(b.x+30, b.y, 40, 20);
            ctx.fillStyle="#e67e22"; ctx.font="12px Arial"; ctx.fillText("COLA", b.x+35, b.y+60);
        }
        function drawEstilete(b) {
            ctx.fillStyle = "#1abc9c"; ctx.fillRect(b.x, b.y+30, 100, 40);
            ctx.fillStyle="#bdc3c7"; ctx.fillRect(b.x+100, b.y+35, 30, 30);
        }
        function drawCalculadora(b) {
            ctx.fillStyle = "#34495e"; ctx.fillRect(b.x, b.y, 80, 100);
            ctx.fillStyle="#95afc0"; ctx.fillRect(b.x+10, b.y+10, 60, 25);
            ctx.fillStyle="#bdc3c7"; for(let y=0;y<3;y++)for(let x=0;x<3;x++)ctx.fillRect(b.x+15+x*20, b.y+45+y*15, 10, 10);
        }
        function drawCompasso(b) {
            ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth=4;
            ctx.beginPath(); ctx.moveTo(b.x+50, b.y); ctx.lineTo(b.x+30, b.y+100); ctx.moveTo(b.x+50, b.y); ctx.lineTo(b.x+70, b.y+100); ctx.stroke();
        }
        function drawTinta(b) {
            ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc(b.x+50, b.y+60, 40, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#fff"; ctx.fillRect(b.x+30, b.y+10, 40, 20);
        }
        function drawEsquadro(b) {
            ctx.fillStyle = "rgba(52, 152, 219, 0.4)"; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+100); ctx.lineTo(b.x, b.y+100); ctx.fill();
            ctx.strokeStyle="#000"; ctx.stroke();
        }
        function drawFragmentadora(b) {
            ctx.fillStyle = "#2d3436"; ctx.fillRect(b.x, b.y, 100, 100);
            ctx.fillStyle="#636e72"; ctx.fillRect(b.x+10, b.y+20, 80, 15);
        }
        function drawCorrupted(b) {
            ctx.shadowBlur = 20; ctx.shadowColor = "red"; ctx.fillStyle = "#1a1a1a";
            ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+100, b.y+10); ctx.lineTo(b.x+90, b.y+100); ctx.lineTo(b.x+5, b.y+90); ctx.fill();
            ctx.fillStyle = "red"; ctx.fillRect(b.x+25, b.y+30, 15, 5); ctx.fillRect(b.x+60, b.y+30, 15, 5); ctx.shadowBlur = 0;
        }

        const bossSkins = [
            { name: "Clipe de Aço", draw: drawClipe }, { name: "Borracha", draw: drawBorracha }, { name: "Apontador de Metal", draw: drawApontador },
            { name: "Régua Graduada", draw: drawRegua }, { name: "Grampeador", draw: drawGrampeador }, { name: "Perfurador", draw: drawPerfurador },
            { name: "Tesoura de Ponta", draw: drawTesoura }, { name: "Cola Bastão Grudenta", draw: drawCola }, { name: "Estilete Profissional", draw: drawEstilete },
            { name: "Calculadora", draw: drawCalculadora }, { name: "Compasso de Precisão", draw: drawCompasso }, { name: "Tinta Guache", draw: drawTinta },
            { name: "Esquadro Acrílico", draw: drawEsquadro }, { name: "Fragmentadora", draw: drawFragmentadora }, { name: "PAPERMAN CORROMPIDO", draw: drawCorrupted }
        ];

        // --- LÓGICA DO JOGO ---
        function initLevel() {
            bullets = []; bossProjectiles = []; particles = [];
            player.x = 450; player.y = 550; invencible = 0;
            if(!startTime) startTime = Date.now();
            document.getElementById('lvlTxt').innerText = level;
            const skin = bossSkins[level - 1];
            let bHp = 60 + (level * 40);
            boss = { x: 400, y: 100, w: 100, h: 100, hp: bHp, maxHp: bHp, vx: 4 + (level * 0.4), skin: skin, shotTimer: 0 };
            document.getElementById('bossName').innerText = skin.name;
            document.getElementById('hp-fill').style.width = "100%";
            updateLivesUI();
        }

        function takeDamage() {
            if (invencible > 0 || isDead || isPaused) return;
            hp--; updateLivesUI(); playSound(150, 'sawtooth', 0.2, 0.1); 
            if (hp <= 0) { isDead = true; document.getElementById('gameOverOverlay').style.display = 'flex'; } 
            else invencible = 80;
        }

        function updateLivesUI() {
            let h = ""; let t = hp;
            for(let i=0; i<3; i++) { if(t>=2){ h+="❤️"; t-=2; } else if(t==1){ h+="💔"; t-=1; } else h+="🖤"; }
            document.getElementById('livesDisplay').innerHTML = h;
        }

        function retryGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            level = 1; hp = 6; isDead = false; startTime = Date.now(); totalPausedTime = 0;
            initLevel();
        }

        window.onkeydown = (e) => { 
            if (e.key === "Escape") { isPaused = !isPaused; if (isPaused) pauseStart = Date.now(); else totalPausedTime += (Date.now() - pauseStart); }
            keys[e.key.toLowerCase()] = true; 
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        window.onmousedown = (e) => {
            if (isDead || isPaused) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            const rect = canvas.getBoundingClientRect();
            const angle = Math.atan2((e.clientY - rect.top) - (player.y + 25), (e.clientX - rect.left) - (player.x + 20));
            bullets.push({ x: player.x + 20, y: player.y + 25, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
            playSound(400, 'triangle', 0.1, 0.05, true);
        };

        function update() {
            if (isPaused || isDead) return;
            let elapsed = Date.now() - startTime - totalPausedTime;
            let s = Math.floor(elapsed/1000);
            document.getElementById('timeDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

            if (invencible > 0) invencible--;
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.h) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.w) player.x += player.speed;

            boss.x += boss.vx; if(boss.x < 50 || boss.x > 750) boss.vx *= -1;
            boss.shotTimer++;
            if (boss.shotTimer > Math.max(15, 80 - (level * 4))) {
                const angle = Math.atan2((player.y + 25) - (boss.y + 50), (player.x + 20) - (boss.x + 50));
                bossProjectiles.push({ x: boss.x + 50, y: boss.y + 50, vx: Math.cos(angle) * (6 + level/2), vy: Math.sin(angle) * (6 + level/2) });
                boss.shotTimer = 0;
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                    boss.hp -= 10; bullets.splice(i, 1); playSound(600, 'square', 0.05, 0.03);
                    particles.push({x: b.x, y:b.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, size:Math.random()*4+1, color:"#95a5a6", alpha:1});
                    document.getElementById('hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
                } else if(b.x < 0 || b.x > 900 || b.y < 0 || b.y > 650) bullets.splice(i, 1);
            });

            bossProjectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(Math.hypot(player.x + 20 - p.x, player.y + 25 - p.y) < 25) { takeDamage(); bossProjectiles.splice(i, 1); }
                else if(p.x < 0 || p.x > 900 || p.y < 0 || p.y > 650) bossProjectiles.splice(i, 1);
            });

            if(boss.hp <= 0) {
                // CURA TOTAL AO PASSAR DE NÍVEL
                hp = 6; 
                if(level === 15) { 
                    const timeStr = document.getElementById('timeDisplay').innerText; alert("VITÓRIA FINAL! Tempo: " + timeStr); 
                    level = 1; startTime = Date.now(); 
                } else level++;
                setTimeout(initLevel, 600);
            }
            particles.forEach((p, i) => { p.x+=p.vx; p.y+=p.vy; p.alpha-=0.02; if(p.alpha<=0)particles.splice(i,1); });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid background
            ctx.strokeStyle = "rgba(52, 152, 219, 0.15)"; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            
            particles.forEach(p=>{ ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});

            // PLAYER PAPERMAN DETALHADO
            if (invencible % 10 < 5) {
                ctx.save(); ctx.translate(player.x, player.y);
                ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#4b4b4b"; ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(2, 5); ctx.lineTo(15, 0); ctx.lineTo(38, 3); ctx.lineTo(35, 25); ctx.lineTo(40, 52); ctx.lineTo(20, 55); ctx.lineTo(3, 50); ctx.lineTo(5, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(5, 15); ctx.lineTo(35, 25); ctx.moveTo(10, 40); ctx.lineTo(30, 35); ctx.stroke();
                ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.ellipse(12, 18, 2.5, 3.5, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(28, 18, 2.5, 3.5, 0, 0, 7); ctx.fill();
                ctx.strokeStyle = "#2d3436"; ctx.beginPath(); ctx.arc(20, 28, 6, 0.2, Math.PI - 0.2); ctx.stroke();
                ctx.restore();
            }

            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#999"; ctx.lineWidth=1; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); ctx.stroke(); });
            ctx.fillStyle = "#e74c3c"; bossProjectiles.forEach(p => ctx.fillRect(p.x-5, p.y-5, 10, 10));
            
            if(boss) boss.skin.draw(boss);

            if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center"; ctx.fillText("PAUSA", canvas.width/2, canvas.height/2); }
            update(); requestAnimationFrame(draw);
        }

        initLevel(); draw();
    </script>
</body>
</html>
