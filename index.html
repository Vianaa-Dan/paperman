<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paperman: Hall of Fame Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        canvas { background: #fff; border: 4px solid #333; cursor: crosshair; margin-top: 20px; }
        .hud { position: absolute; top: 40px; left: 40px; pointer-events: none; color: #222; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 8px; z-index: 10; min-width: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lives { color: #e74c3c; font-size: 24px; margin-top: 5px; font-family: serif; }
        .timer { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 18px; color: #2980b9; }
        .best-time { font-size: 12px; color: #7f8c8d; margin-bottom: 8px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        #bossUI { position: absolute; top: 40px; width: 400px; display: none; text-align: center; z-index: 5; }
        .hp-bg { width: 100%; height: 20px; background: #ddd; border: 2px solid #222; }
        #hp-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.1s; }
        #bossName { color: #e74c3c; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; text-shadow: 1px 1px 0 #fff; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="best-time">Recorde: <span id="bestDisplay">--:--</span></div>
        <div class="timer">Tempo: <span id="timeDisplay">00:00</span></div>
        <hr>
        <b>PAPELMAN</b><br>
        Nível: <span id="lvlTxt">1</span>/15<br>
        <div class="lives" id="livesDisplay"></div>
        <small id="objTxt">Colete os papéis!</small><br>
        <small style="color: #666;">ESC para Pausar</small>
    </div>

    <div id="bossUI">
        <div id="bossName">Chefão</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;

        let level = 1, hp = 6, gameState = 'play', isDead = false, isPaused = false, invencible = 0;
        let startTime = Date.now();
        let finalTimeMs = 0;
        let totalPausedTime = 0;
        let pauseStart = 0;

        const player = { x: 400, y: 500, w: 30, h: 40, speed: 5 };
        let bullets = [], items = [], enemies = [], particles = [], bossProjectiles = [], boss = null;
        const keys = {};

        // Carregar Recorde do LocalStorage
        function loadBestTime() {
            const saved = localStorage.getItem('papermanBestTime');
            if (saved) {
                document.getElementById('bestDisplay').innerText = formatMs(parseInt(saved));
            }
        }

        function formatMs(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        window.onkeydown = (e) => { 
            if (e.key === "Escape") {
                isPaused = !isPaused;
                if (isPaused) pauseStart = Date.now();
                else totalPausedTime += (Date.now() - pauseStart);
            }
            keys[e.key.toLowerCase()] = true; 
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        
        window.onmousedown = (e) => {
            if (isDead || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const angle = Math.atan2((e.clientY - rect.top) - (player.y + 20), (e.clientX - rect.left) - (player.x + 15));
            bullets.push({ x: player.x + 15, y: player.y + 20, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10 });
        };

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 5 + 2;
                this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10;
                this.gravity = 0.2; this.alpha = 1; this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.alpha -= 0.02; }
            draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.globalAlpha = 1; }
        }

        function updateTimer() {
            if (isPaused || isDead || finalTimeMs > 0) return;
            let elapsed = Date.now() - startTime - totalPausedTime;
            document.getElementById('timeDisplay').innerText = formatMs(elapsed);
            return elapsed;
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
        }

        function takeDamage() {
            if (invencible > 0 || isDead || isPaused) return;
            hp -= 1;
            updateLivesUI();
            createExplosion(player.x + 15, player.y + 20, "#ff4d4d", 10);
            if (hp <= 0) {
                isDead = true; 
                createExplosion(player.x + 15, player.y + 20, "#fff", 40);
                setTimeout(() => { 
                    alert("GAME OVER!"); 
                    level = 1; hp = 6; isDead = false; 
                    startTime = Date.now(); totalPausedTime = 0;
                    initLevel(); 
                }, 1200);
            } else { invencible = 60; }
        }

        function updateLivesUI() {
            const display = document.getElementById('livesDisplay');
            let heartsHtml = "";
            let tempHp = hp;
            for (let i = 0; i < 3; i++) {
                if (tempHp >= 2) { heartsHtml += "❤️"; tempHp -= 2; }
                else if (tempHp === 1) { heartsHtml += "💔"; tempHp -= 1; }
                else heartsHtml += "🖤";
            }
            display.innerHTML = heartsHtml;
        }

        function initLevel() {
            items = []; enemies = []; bullets = []; boss = null; particles = []; bossProjectiles = [];
            player.x = 400; player.y = 500; invencible = 0;
            updateLivesUI();
            document.getElementById('lvlTxt').innerText = level;
            const isBossLvl = level % 2 === 0 || level === 15;

            if (isBossLvl) {
                gameState = 'boss';
                document.getElementById('bossUI').style.display = 'block';
                let bossHp = 50 + (level * 25);
                boss = { x: 350, y: 100, w: 100, h: 100, hp: bossHp, maxHp: bossHp, vx: 3 + (level/4), color: level === 15 ? "#000" : "#555", shotTimer: 0 };
                document.getElementById('bossName').innerText = level === 15 ? "PAPERMAN CORROMPIDO" : "Grampeador Gigante";
                document.getElementById('hp-fill').style.width = "100%";
            } else {
                gameState = 'play';
                document.getElementById('bossUI').style.display = 'none';
                for(let i=0; i < 5 + level; i++) items.push({ x: Math.random()*700+50, y: Math.random()*400+50 });
                for(let i=0; i < Math.floor(level/2) + 1; i++) enemies.push({ x: Math.random()*700, y: Math.random()*300, vx: 2 + (level/5), vy: 2 + (level/5) });
            }
        }

        function update() {
            if (isPaused || isDead) {
                if (isDead) particles.forEach((p, i) => { p.update(); if (p.alpha <= 0) particles.splice(i, 1); });
                return;
            }

            let currentElapsed = updateTimer();
            if (invencible > 0) invencible--;

            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.h) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.w) player.x += player.speed;

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) bullets.splice(i, 1);
            });

            bossProjectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(Math.hypot(player.x + 15 - p.x, player.y + 20 - p.y) < 20) { takeDamage(); bossProjectiles.splice(i, 1); }
                if(p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) bossProjectiles.splice(i, 1);
            });

            if (gameState === 'play') {
                items.forEach((it, i) => { if(Math.hypot(player.x - it.x, player.y - it.y) < 30) items.splice(i, 1); });
                enemies.forEach(en => {
                    en.x += en.vx; en.y += en.vy;
                    if(en.x < 0 || en.x > 780) en.vx *= -1; if(en.y < 0 || en.y > 580) en.vy *= -1;
                    if(Math.hypot(player.x - en.x, player.y - en.y) < 30) takeDamage();
                });
                if(items.length === 0) { level++; initLevel(); }
            } else if (gameState === 'boss') {
                boss.x += boss.vx;
                if(boss.x < 0 || boss.x > 700) boss.vx *= -1;
                boss.shotTimer++;
                let interval = level === 15 ? 40 : 100 - (level * 2); 
                if (boss.shotTimer > interval) {
                    const angle = Math.atan2((player.y + 20) - (boss.y + 50), (player.x + 15) - (boss.x + 50));
                    bossProjectiles.push({ x: boss.x + 50, y: boss.y + 50, vx: Math.cos(angle) * (5 + level/3), vy: Math.sin(angle) * (5 + level/3) });
                    boss.shotTimer = 0;
                }
                if (Math.hypot(player.x - (boss.x + 50), player.y - (boss.y + 50)) < 65) takeDamage();
                bullets.forEach((b, bi) => {
                    if(b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                        boss.hp -= 10; bullets.splice(bi, 1);
                        createExplosion(b.x, b.y, boss.color, 5);
                        document.getElementById('hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
                    }
                });
                if(boss.hp <= 0) {
                    createExplosion(boss.x + 50, boss.y + 50, boss.color, 60);
                    if(level === 15) { 
                        finalTimeMs = currentElapsed;
                        const best = localStorage.getItem('papermanBestTime');
                        if (!best || finalTimeMs < parseInt(best)) {
                            localStorage.setItem('papermanBestTime', finalTimeMs);
                            alert(`NOVO RECORDE! Tempo: ${formatMs(finalTimeMs)}`);
                        } else {
                            alert(`VITÓRIA! Tempo final: ${formatMs(finalTimeMs)}`);
                        }
                        // Reset do jogo
                        level = 1; hp = 6; startTime = Date.now(); totalPausedTime = 0; finalTimeMs = 0;
                        loadBestTime();
                    } else { level++; }
                    setTimeout(initLevel, 600);
                }
            }
            particles.forEach((p, i) => { p.update(); if (p.alpha <= 0) particles.splice(i, 1); });
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            particles.forEach(p => p.draw());
            if (!isDead) {
                if (invencible % 10 < 5) {
                    ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
                    ctx.strokeRect(player.x, player.y, player.w, player.h);
                    ctx.fillStyle = "#333";
                    ctx.fillRect(player.x + 6, player.y + 10, 4, 4); ctx.fillRect(player.x + 20, player.y + 10, 4, 4);
                }
            }
            ctx.fillStyle = "#999"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
            ctx.fillStyle = "#e74c3c";
            bossProjectiles.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.vy, p.vx));
                ctx.fillRect(-10, -2, 20, 4); ctx.restore();
            });
            if (gameState === 'play') {
                ctx.fillStyle = "#f1c40f"; items.forEach(it => ctx.fillRect(it.x, it.y, 15, 20));
                ctx.fillStyle = "#e74c3c"; enemies.forEach(en => ctx.fillRect(en.x, en.y, 20, 20));
            } else if (boss) {
                ctx.fillStyle = boss.color; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                if(level === 15) { ctx.fillStyle = "red"; ctx.fillRect(boss.x + 20, boss.y + 30, 15, 15); ctx.fillRect(boss.x + 65, boss.y + 30, 15, 15); }
            }
            if (isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,800,600);
                ctx.fillStyle = "#fff"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("PAUSA", 400, 300);
            }
            update();
            requestAnimationFrame(draw);
        }

        loadBestTime();
        initLevel();
        draw();
    </script>
</body>
</html>
